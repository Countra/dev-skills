name: Planner Executor Contract

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: planner-executor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contract:
    name: ${{ matrix.os }} planner and executor contract
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUTF8: "1"
    steps:
      - name: Checkout candidate tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Planner unit tests
        run: python -u -X utf8 -B -m unittest discover -s skills/complex-coding-planner/tests -p "test_*.py" -v

      - name: Run Planner deterministic evals
        run: python -u -X utf8 -B evals/complex-coding-planner/run_evals.py --output .ci-artifacts/planner-executor/planner-evals.json

      - name: Run Executor unit tests
        run: python -u -X utf8 -B -m unittest discover -s skills/complex-coding-executor/tests -p "test_*.py" -v

      - name: Run Executor deterministic evals
        run: python -u -X utf8 -B evals/complex-coding-executor/run_evals.py --output .ci-artifacts/planner-executor/executor-evals.json

      - name: Upload deterministic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-planner-executor-evidence
          path: |
            .ci-artifacts/planner-executor/planner-evals.json
            .ci-artifacts/planner-executor/executor-evals.json
          if-no-files-found: error
          retention-days: 14
