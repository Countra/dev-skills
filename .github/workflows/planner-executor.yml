name: Compact Coding Skills

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compact-coding-skills-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: ubuntu compact workflow
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUTF8: "1"
    steps:
      - name: Checkout candidate tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Planner tests
        run: python -u -X utf8 -B -m unittest discover -s skills/complex-coding-planner/tests -p "test_*.py" -v

      - name: Run Reviewer tests
        run: python -u -X utf8 -B -m unittest discover -s skills/complex-coding-reviewer/tests -p "test_*.py" -v

      - name: Run Executor state tests
        run: python -u -X utf8 -B -m unittest discover -s skills/complex-coding-executor/tests -p "test_compact_state.py" -v

      - name: Run compact cross-skill eval
        run: python -u -X utf8 -B evals/complex-coding-workflow/run_evals.py

      - name: Check Planner skill
        run: python -u -X utf8 -B skills/skill-evaluation-lab/scripts/se_check.py --workspace . --candidate skills/complex-coding-planner

      - name: Check Reviewer skill
        run: python -u -X utf8 -B skills/skill-evaluation-lab/scripts/se_check.py --workspace . --candidate skills/complex-coding-reviewer

      - name: Check Executor skill
        run: python -u -X utf8 -B skills/skill-evaluation-lab/scripts/se_check.py --workspace . --candidate skills/complex-coding-executor

  bounded-command:
    name: ${{ matrix.os }} bounded command
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout candidate tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bounded command observation and cleanup tests
        run: python -u -X utf8 -B -m unittest discover -s skills/complex-coding-executor/tests -p "test_bounded_command.py" -v
