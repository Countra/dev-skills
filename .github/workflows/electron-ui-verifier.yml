name: Electron UI Verifier

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-cdp:
    name: ${{ matrix.os }} public contract and CDP lifecycle
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked runtime
        run: python -m pip install -r skills/electron-ui-verifier/requirements.txt
      - name: Install Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium
      - name: Install Chromium
        if: runner.os != 'Linux'
        run: python -m playwright install chromium
      - name: Unit and component tests
        env:
          EV_TEST_ROOT: .harness/electron-ui-verifier-ci/${{ matrix.os }}/unit
        run: python -u -X utf8 -B -m unittest discover -s skills/electron-ui-verifier/tests -p "test_*.py" -v
      - name: Static contract
        run: python -u -X utf8 -B evals/electron-ui-verifier/run_static_checks.py
      - name: Skill public surface
        run: >-
          python -u -X utf8 -B evals/electron-ui-verifier/run_evals.py
          --work-dir ".harness/electron-ui-verifier-ci/${{ matrix.os }}/task/tmp/evals"
      - name: Fixture CDP lifecycle
        run: >-
          python -u -X utf8 -B skills/electron-ui-verifier/tests/run_fixture_cdp_smoke.py
          --work-dir ".harness/electron-ui-verifier-ci/${{ matrix.os }}/public-fixture"
          --output ".harness/electron-ui-verifier-ci/${{ matrix.os }}/public-fixture/result.json"
      - name: Copy install and retention
        run: >-
          python -u -X utf8 -B evals/electron-ui-verifier/run_portability_retention.py
          --work-dir ".harness/electron-ui-verifier-ci/${{ matrix.os }}/portable"
          --output ".harness/electron-ui-verifier-ci/${{ matrix.os }}/portable/result.json"
      - name: Retrieval quality and performance
        if: runner.os == 'Linux'
        run: >-
          python -u -X utf8 -B evals/electron-ui-verifier/run_retrieval_benchmark.py
          --work-dir ".harness/electron-ui-verifier-ci/${{ matrix.os }}/retrieval"
          --output ".harness/electron-ui-verifier-ci/${{ matrix.os }}/retrieval/result.json"
